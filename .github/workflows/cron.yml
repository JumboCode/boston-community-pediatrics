name: Cron Jobs

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 9 * * *"

jobs:
  cleanup-events:
    if: github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Run cleanup-events
        run: |
          curl -s -X POST ${{ secrets.APP_URL }}/api/cron/cleanup-events \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  remind-volunteers:
    if: github.event.schedule == '0 9 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Send volunteer reminders
        run: |
          curl -s -X POST ${{ secrets.APP_URL }}/api/cron/remind-volunteers \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
